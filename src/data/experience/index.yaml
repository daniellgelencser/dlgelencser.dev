  - id: nordcloud.txt
    label: "nordcloud.txt"
    type: file
    content: "Cloud Developer — Nordcloud (an IBM Company)\n2024 Jan – Present (2 Years) | Amsterdam, The Netherlands\n\n• Designed and implemented cloud-native architectures, helping organisations migrate and modernise applications across Azure and AWS, ensuring systems are scalable, reliable, and secure.\n• Contributed to the design and development of a donor information system for a major NGO, keeping data relevant, secure, and synchronised across multiple platforms.\n• Developed a logistics tracking system for a major energy company, monitoring deliveries via trucks and ferries.\n• Involved in the development of a zero-touch DevOps automation system for a pharmaceutical company, enabling secure management of project creation across multiple cloud platforms.\n• Contributed to a comprehensive data processing platform for a leading news agency, enabling reliable handling of large-scale information flows.\n• Maintained infrastructure as code, automated deployments through CI/CD pipelines, and provided guidance on practical implementation and best practices.\n\nStack: Azure • AWS • .NET/C# • Java • Dapr • Bicep • Ansible • Azure DevOps • Serverless Functions • NoSQL • SLES • Linux/Bash • Agile/Scrum • Integration/Unit Testing"
  - id: evalan.txt
    label: "evalan.txt"
    type: file
    content: "Software Engineer — Evalan\n2020 Jun – 2023 May (3 Years) | Amsterdam, The Netherlands\n\n• Led a team of software engineers to develop a complex data-processing IoT application.\n• Designed and implemented a serverless microservice architecture, scaling an existing application from proof of concept to handle large volume, high-velocity data in production.\n• Mentored junior developers on the implementation and testing of the new cloud architecture.\n• Led collaboration between different teams on the conceptualisation and deployment of comprehensive testing suites, ensuring rigorous quality control throughout the development lifecycle.\n\nStack: Azure • .NET/C# • PHP • JavaScript • Azure DevOps • Microservices • Software Architecture • Scrum • Git • New Relic • SQL • Redis • Jira • Integration/Unit Testing"
  - id: tripleplay.txt
    label: "tripleplay.txt"
    type: file
    content: "IT Support Engineer — Tripleplay\n2018 Sep – 2019 Aug (1 Year) | London, United Kingdom\n\n• Resolved a variety of IT tasks, tackling complex infrastructure issues, providing essential support to co-workers, and conducting maintenance tasks.\n• Effectively supported development VM instances, ensuring their seamless operation while maintaining the hypervisor infrastructure, and conducting software and hardware upgrades.\n• Improved cross-team engagement by implementing a streamlined, user-friendly internal social media app.\n• Aided HR by customising and deploying an open-source HRM tool, reducing administrative workload and boosting productivity for the department.\n\nStack: PHP • JavaScript • JQuery • SQL • Linux • VMware • Git • OTRS"
  - id: amadeus.txt
    label: "amadeus.txt"
    type: file
    content: "Vendor Manager Intern — Amadeus IT Group\n2019 Sep – 2020 May (Part of BSc placement) | London, United Kingdom\n\n• Supported vendor management operations and coordinated with internal and external stakeholders.\n• Assisted in tracking and reporting on supplier performance and contract compliance.\n• Contributed to process improvement initiatives within the procurement and vendor operations team."
  - id: freelance.txt
    label: "freelance.txt"
    type: file
    content: "Software Developer (Freelance Projects) — Self-employed\n2017 Sep – 2018 Aug (1 Year) | London, United Kingdom\n\n• Created and deployed a database system with a user interface to monitor employee working hours in a medical and research institution.\n• Developed a specialised social media platform for football players, focusing on user profiles, content sharing, and engagement features.\n• Designed, implemented, and launched an e-commerce website for a bakery, enhancing their online presence and sales capabilities.\n\nStack: Java • JavaScript • React • SQL • Git • Linux"
