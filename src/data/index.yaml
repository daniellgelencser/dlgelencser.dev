    content: "CORE SKILLS\n───────────────────────────────────────\nCloud-Native Applications\nServerless Architecture\nMicroservices\nBackend Development\nAgile Methodologies\n\nTECHNOLOGIES & TOOLS\n───────────────────────────────────────\nCloud:      Azure • AWS • GCP\nLanguages:  C# / .NET • Java • Python • JavaScript • PHP • Go • C/C++\nInfra:      Bicep • Ansible • Dapr • Docker • CI/CD (Azure DevOps)\nData:       SQL • NoSQL • Redis\nOther:      Git • Linux/Bash • Jira • New Relic • Scrum/Agile"
