files:
  - id: about_me.txt
    label: "about_me.txt"
    type: file
    content: "Daniel Lorant Gelencser\nSoftware Engineer & Cloud Developer\nHillegom, The Netherlands\n\nAiming to enhance my expertise across Programming, DevOps Engineering, Cloud Infrastructure, Software Architecture, and Project Management. I have designed and implemented robust software systems including cloud-native architectures for NGOs, logistics platforms for energy companies, zero-touch DevOps systems for pharmaceutical projects, large-scale data processing platforms for news agencies, and IoT systems for construction equipment and beverage manufacturers.\n\nI have led complex projects, mentored new talents, and contributed to innovation by integrating modern cloud and microservice technologies into practical solutions. My career strategy focuses on broad foundational knowledge while achieving deep expertise in Software Development, Microservices, Cloud Computing, and Data Processing."
  - id: credentials.txt
    label: "credentials.txt"
    type: file
    content: "MICROSOFT CERTIFIED: Azure Developer Associate (AZ-204)\n2024 | The Netherlands\n\nScope: Develop Azure compute solutions • Develop for Azure storage • Implement Azure security • Monitor, troubleshoot, and optimize Azure solutions • Connect to and consume Azure services and third-party services\n\nVerify: https://learn.microsoft.com/api/credentials/share/en-us/DanielGelencser-7802/A988874E423BC318?sharingId=A9A7DB93C9BC5681"
  - id: skills.txt
    label: "skills.txt"
    type: file
    content: "CORE SKILLS\n───────────────────────────────────────\nCloud-Native Applications\nServerless Architecture\nMicroservices\nBackend Development\nAgile Methodologies\n\nTECHNOLOGIES & TOOLS\n───────────────────────────────────────\nCloud:      Azure • AWS • GCP\nLanguages:  C# / .NET • Java • Python • JavaScript • PHP • Go • C/C++\nInfra:      Bicep • Ansible • Dapr • Docker • CI/CD (Azure DevOps)\nData:       SQL • NoSQL • Redis\nOther:      Git • Linux/Bash • Jira • New Relic • Scrum/Agile"
