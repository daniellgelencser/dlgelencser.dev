files:
  - id: about_me.txt
    label: "about_me.txt"
    type: file
    content: "Daniel Lorant Gelencser | Cloud Native Software Engineer\n\nWith over 7 years of experience, I build cloud native applications that solve complex problems across industries, from IoT for construction to automated DevOps for Pharma and logistics for Energy.\n\nI treat infrastructure and software as a single cohesive system rather than separate layers. By owning the full development lifecycle, I build cloud native solutions that take advantage of automation and distributed architecture to deliver systems that stay resilient and cost effective as they scale.\n\nBeyond the code, I work closely with clients to refine their ideas into clear requirements and user stories, ensuring that the technical implementation delivers genuine value from the start."
  - id: credentials.txt
    label: "credentials.txt"
    type: file
    content: "MICROSOFT CERTIFIED: Azure Developer Associate (AZ-204)\n2024 | The Netherlands\n\nScope: Develop Azure compute solutions • Develop for Azure storage • Implement Azure security • Monitor, troubleshoot, and optimize Azure solutions • Connect to and consume Azure services and third-party services\n\nVerify: https://learn.microsoft.com/api/credentials/share/en-us/DanielGelencser-7802/A988874E423BC318?sharingId=A9A7DB93C9BC5681"
